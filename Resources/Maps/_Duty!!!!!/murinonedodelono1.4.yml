    - type: Paper
      content: >+
        Мы нашли её глубже третьего слоя, за коридорами, где стены будто дышат.

        Металл вокруг неё оплавлен, словно его касались чемто живым и горячим. На поверхности — следы когтей. Слишком большие, чтобы принадлежать человеку.

        Она? Погоди что это за оружия?


        Дверь не ведёт в отсек. Не ведёт в шахту. Не ведёт в техническое помещение.

        Она ведёт туда.


        Иногда она открывается сама. Медленно. Без звука.

        И тогда оттуда выползают они.


        Сначала один. Потом несколько. Их тела искажены, будто их собрали из чужих частей. Они не издают звуков — только скрежет по полу и влажное дыхание. Свет рядом с дверью начинает мерцать, а воздух становится тяжёлым, как перед грозой.


        Мы пытались заварить её.

        Мы пытались заминировать проход.

        Мы пытались заблокировать доступ картами.


        Бесполезно.


        Каждый, кто проходил через эту дверь, не вернулся.


        Ни одного сигнала.

        Ни одного крика.

        Ни одного тела.


        Только пустота по ту сторону и тишина, которая звучит хуже любого вопля.


        Если ты читаешь это — не подходи к ней.

        Не смотри в щель, когда она приоткрывается.

        Не слушай шёпот, который идёт изнутри.


        Я слышу её снова.


        Я иду внутрь.


