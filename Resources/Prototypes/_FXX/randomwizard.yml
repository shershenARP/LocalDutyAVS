- type: entity
  name: Щит Удачи
  parent: [ BaseShield, BaseMagicalContraband ]
  id: RandomShieldFXX
  description: рандом-мегаладон...
  suffix: FXX
  components:
    - type: Sprite
      sprite: _FXX/randomwizardshield.rsi
      state: riot_bullet-icon
    - type: Item
      sprite: _FXX/randomwizardshield.rsi
      heldPrefix: riot_bullet
    - type: Reflect
      reflectProb: 0.5
      reflects:
        - Energy
        - NonEnergy
    - type: Blocking
      passiveBlockModifier:
        coefficients:
          Blunt: 0.45
          Slash: 0.4
          Piercing: 0.5
          Heat: 0.5
      activeBlockModifier:
        coefficients:
          Blunt: 0.2
          Slash: 0.3
          Piercing: 0.4
          Heat: 0.3
        flatReductions:
          Heat: 1
      blockSound: !type:SoundPathSpecifier
        path: /Audio/Effects/metal_thud3.ogg
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 400
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
            - !type:PlaySoundBehavior
              sound:
                collection: GlassBreak
    - type: Repairable
      damage:
        groups:
          Brute: -10
        types:
          Heat: -10
      fuelCost: 4
      doAfterDelay: 5
      allowSelfRepair: false       

- type: entity
  id: ProjectileIcestunFXX
  parent: BaseBullet
  name: осколок холода
  description: Brrrrr.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Structures/Specific/Anomalies/ice_anom.rsi
    state: bullet
  - type: Projectile
    damage:
      types:
        Piercing: 20
        Cold: 20
        Structural: 50
  - type: StunOnCollide
    stunAmount: 5
    drop: true 
    knockdownAmount: 10
    slowdownAmount: 20
    walkSpeedModifier: 0.5
    sprintSpeedModifier: 0.5

