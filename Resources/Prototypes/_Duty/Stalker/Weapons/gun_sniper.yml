# Снайперские винтовки — порт из STALKER-14 (Фаза 1, ваниль-поведение).
# Болтовки (Мосина, СКС) — на STBaseWeaponSniper (BallisticAmmoProvider в ствол).
# Магазинные (СВД/Vepr/ВСС/ОСВ) — на STBaseWeaponRifle (ChamberMagazine).
# Стрип: Scope (RMC14, зум в Фазе 2), FarGunshot, ParticleOnGunShot.

# ── Мосина (болтовка, 7.62x54) ───────────────────────────────────────────────
- type: entity
  abstract: true
  parent: STBaseWeaponSniper
  id: STBaseWeaponSniperMosin
  components:
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/Mosin.rsi
  - type: STWeight
    self: 4.5
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/Mosin.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/Mosin.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/sniper.ogg
      params:
        volume: 0.7
    minAngle: 50
    maxAngle: 80
    angleIncrease: 5
    angleDecay: 25
    fireRate: 0.6
  - type: BallisticAmmoProvider
    proto: STCartridge754FMJ
    capacity: 5
    whitelist:
      tags:
      - STCartridge754

- type: entity
  parent: STBaseWeaponSniperMosin
  id: STWeaponSniperMosin
  suffix: "Duty, Stalker"
  name: Мосина
  description: Легендарная болтовая винтовка Мосина под 7.62x54мм R. Медленная перезарядка и 5 патронов, но огромная останавливающая сила.

