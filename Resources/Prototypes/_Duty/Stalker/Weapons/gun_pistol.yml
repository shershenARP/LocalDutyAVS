# Пистолеты — порт из STALKER-14 (Фаза 1, ваниль-поведение).
# Стрип: FarGunshot, ParticleOnGunShot, Craftable, RepositoryItem.
# gun_auto_sear/gun_module_muzzle — слоты модулей (Фаза 2), контейнеры создаёт ItemSlots.

# ── АПС (9x18) ───────────────────────────────────────────────────────────────
- type: entity
  parent: STBaseWeaponPistol
  id: WeaponPistolStalkerAPS
  suffix: "Duty, Stalker"
  name: АПС
  description: Автоматический Пистолет Стечкина под 9х18 и собственный магазин на 20 патронов.
  components:
  - type: STWeight
    self: 1.1
  - type: Sprite
    scale: 0.6, 0.6
    sprite: _Stalker/Objects/Weapons/Guns/Pistols/aps.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Pistols/aps.rsi
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/pm-shoot.ogg
    projectileSpeed: 35
    minAngle: 10
    maxAngle: 50
    fireRate: 8
    angleIncrease: 1.5
    angleDecay: 5
    selectedMode: FullAuto
    availableModes:
    - FullAuto
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: BaseAPSMag
        priority: 3
        whitelist:
          tags:
          - MagazineAPS
      gun_auto_sear:
        name: Insides
        priority: 2
        whitelist:
          tags:
          - STModuleAutoSear
      gun_module_muzzle:
        name: Muzzle
        priority: 4
        whitelist:
          tags:
          - STWeaponModulePistolSilencer
      gun_chamber:
        name: Chamber
        startingItem: STCartridge918PGJ
        priority: 1
        whitelist:
          tags:
          - STCartridge918

- type: entity
  parent: WeaponPistolStalkerAPS
  id: WeaponPistolStalkerAPSHugo
  name: АПС "Хуго"
  description: Массивный и надёжный пистолет с прочной металлической рамой — верный спутник бывалого сталкера.
  components:
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Pistols/_Skins/apshugo.rsi
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Pistols/_Skins/apshugo.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Pistols/_Skins/apshugo.rsi

