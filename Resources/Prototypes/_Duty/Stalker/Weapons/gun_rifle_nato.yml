# Западные винтовки (5.56x45 NATO + пара 5.45 на базе AK-74M) — порт из STALKER-14.
# Scope (зум) убран — Фаза 2. Burst поддерживается нашим Gun.

# ── M16 ──────────────────────────────────────────────────────────────────────
- type: entity
  abstract: true
  parent: STBaseWeaponRifle
  id: STBaseWeaponRifleM16
  components:
  - type: STWeight
    self: 3
  - type: Item
    sprite: _Stalker_EN/Objects/Weapons/Guns/Rifles/m16/inhand.rsi
  - type: Sprite
    sprite: _Stalker_EN/Objects/Weapons/Guns/Rifles/m16/icon.rsi
  - type: Clothing
    sprite: _Stalker_EN/Objects/Weapons/Guns/Rifles/m16/inhand.rsi
  - type: Gun
    fireRate: 6
    burstFireRate: 10
    burstCooldown: 0.25
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/m4.ogg
      params:
        volume: -2
    minAngle: 40
    maxAngle: 75
    angleIncrease: 1
    selectedMode: Burst
    availableModes:
    - Burst
    - SemiAuto
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Base556Mag10
        insertSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagIn/rifle_magin.ogg
        ejectSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagOut/rifle_magout.ogg
        priority: 4
        whitelist:
          tags:
          - Magazine556
      gun_module_muzzle:
        name: Muzzle
        priority: 3
        whitelist:
          tags:
          - STWeaponModuleRifleSilencerNato
      gun_chamber:
        name: Chamber
        startingItem: Cartridge556FMJ
        priority: 1
        whitelist:
          tags:
          - STCartridge556
  - type: STWeaponDamageFalloff
    falloffMultiplier: 0.8
  - type: STWeaponAccuracy
    accuracyMultiplier: 1.5

- type: entity
  parent: STBaseWeaponRifleM16
  id: STWeaponRifleM16
  name: M16
  suffix: "Автомат, Stalker"
  description: Легендарная американская винтовка эпохи Вьетнама. Попадает в Зону через военные склады и чёрный рынок.

