# ── База снайперок ───────────────────────────────────────────────────────────
# Болтовки заряжаются прямо в ствол (ballistic-ammo), часть — через магазин.
- type: entity
  abstract: true
  parent: BaseWeaponSniper
  id: STBaseWeaponSniper
  name: sniper
  components:
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - map: ["enum.GunVisualLayers.Mag"]
  - type: GunWieldBonus
    minAngle: -50
    maxAngle: -50
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []
      gun_module_scope: !type:ContainerSlot {}
      gun_module_muzzle: !type:ContainerSlot {}
  - type: ItemSlots
    slots:
      gun_module_scope:
        name: Scope
        priority: 2
        whitelist:
          tags:
          - STWeaponModuleSniperSight
      gun_module_muzzle:
        name: Muzzle
        priority: 1
        whitelist:
          tags:
          - STWeaponModuleSniperSilencer
  - type: STWeaponModuleContainer
  - type: FarGunshot
    range: 350
    sound:
      path: /Audio/_Stalker/Effects/FarGunshots/sniper1.ogg

