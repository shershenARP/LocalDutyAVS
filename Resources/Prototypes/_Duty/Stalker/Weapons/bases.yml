# Базы портированного из STALKER-14 оружия — привязаны к нашим ванильным базам.
# Дают слои спрайта/визуал магазина, чтобы семейства стволов копировались почти вербатим.
# Кастомные компоненты (STWeight/STWeaponDamageFalloff/STWeaponAccuracy) — пустышки (см. StalkerStubComponents.cs).

# ── База рифлов ──────────────────────────────────────────────────────────────
- type: entity
  abstract: true
  parent: BaseWeaponRifle
  id: STBaseWeaponRifle
  name: rifle
  components:
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: STWeaponModuleContainer
  # Слот прицела для ВСЕХ рифлов (включая АК) — чтобы обвесы крепились единообразно.
  # Магазинные снайперки переопределяют его своим (sniper sight) — мерж по ключу.
  - type: ItemSlots
    slots:
      gun_module_scope:
        name: Scope
        priority: 2
        whitelist:
          tags:
          - STWeaponModuleRifleScopeRu
          - STWeaponModuleRifleScopeNato
  - type: FarGunshot
    range: 260
    sound:
      path: /Audio/_Stalker/Effects/FarGunshots/rifle1.ogg

