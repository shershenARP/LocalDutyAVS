# Боеприпасы 9x19 — порт из STALKER-14. Mutant→Piercing.

# ── Снаряды ──────────────────────────────────────────────────────────────────
- type: entity
  id: Bullet919PSOGJ
  name: bullet (9х19 auto)
  parent: STBasePistolBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 2
  - type: Projectile
    projectileClass: 1
    damage:
      types:
        Piercing: 23
  - type: StaminaDamageOnCollide
    damage: 1

- type: entity
  id: Bullet919PST
  name: bullet (9х19 auto)
  parent: Bullet919PSOGJ
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    projectileClass: 2
    damage:
      types:
        Piercing: 24

- type: entity
  id: Bullet919RIP
  name: bullet (9х19 auto)
  parent: Bullet919PSOGJ
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    projectileClass: 0
    damage:
      types:
        Piercing: 45
        Blunt: 5
        Slash: 5

- type: entity
  id: Bullet919PBM
  name: bullet (9х19 auto)
  parent: Bullet919PSOGJ
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    projectileClass: 3
    damage:
      types:
        Piercing: 26

# ── Патроны ──────────────────────────────────────────────────────────────────
- type: entity
  id: STCartridge919
  name: cartridge (9х19 auto)
  parent: BaseCartridge
  abstract: true
  components:
  - type: Tag
    tags:
    - Cartridge
    - STCartridge919
  - type: CartridgeAmmo
    deleteOnSpawn: true
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Casings/ammo_casing.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
    state: "base"

- type: entity
  id: STCartridge919PSOGJ
  name: cartridge 9x19 PSO
  suffix: "Stalker"
  parent: STCartridge919
  components:
  - type: CartridgeAmmo
    proto: Bullet919PSOGJ

- type: entity
  id: STCartridge919PST
  name: cartridge 9x19 PST
  suffix: "Stalker"
  parent: STCartridge919
  components:
  - type: CartridgeAmmo
    proto: Bullet919PST

- type: entity
  id: STCartridge919RIP
  name: cartridge 9x19 RIP
  suffix: "Stalker"
  parent: STCartridge919
  components:
  - type: CartridgeAmmo
    proto: Bullet919RIP

- type: entity
  id: STCartridge919PBM
  name: cartridge 9x19 PBM
  suffix: "Stalker"
  parent: STCartridge919
  components:
  - type: CartridgeAmmo
    proto: Bullet919PBM

