# Револьверы — порт из STALKER-14 (Фаза 1, ваниль-поведение).
# Стрип: FarGunshot, ParticleOnGunShot, RepositoryItem, StaticPrice.
# .357-револьверы стока ссылались на несуществующие боеприпасы (только теги) —
# перенаправлены на .45 ACP (их описания и так .45 ACP).

# ── Chiappa Rhino 60DS (.45 ACP) ─────────────────────────────────────────────
- type: entity
  parent: STBaseWeaponRevolver
  id: STWeaponRevolverChiappaRhino60DS
  suffix: "Duty, Stalker"
  name: Chiappa Rhino 60DS
  description: Шестизарядный револьвер с инновационным дизайном под .45 ACP. Низкая отдача и малый разброс.
  components:
  - type: STWeight
    self: 1.58
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Revolvers/chiappa_rhino_60ds.rsi
    scale: 0.9, 0.9
    layers:
    - state: icon
      map: ["enum.GunVisualLayers.Base"]
  - type: Gun
    projectileSpeed: 60
    minAngle: 0
    maxAngle: 20
    angleIncrease: 3
    angleDecay: 10
    fireRate: 4
    selectedMode: SemiAuto
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/revolver.ogg
      params:
        volume: 2
  - type: UseDelay
    delay: 1
  - type: RevolverAmmoProvider
    whitelist:
      tags:
      - Cartridge45ACP
      - STSpeedLoader45ACP
    proto: Cartridge45ACPLFMJ
    capacity: 6
    chambers: [ True, True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null, null ]

