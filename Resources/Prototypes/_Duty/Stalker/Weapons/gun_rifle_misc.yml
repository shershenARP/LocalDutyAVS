# Прочие винтовки STALKER-14: 7.62x51 (FAL/M14/Galatz/SCAR-H), 9x39 (AS-VAL/Гроза),
# SIG (5.56/7.62x39), VSV (5.45), ОЦ-14 Гроза, скины AK-104/AK-12/AK-15/РПК-16.
# Scope (зум) стрипнут — Фаза 2. FarGunshot опущен (не портируем).

