    self: 4.5
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/fal.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/fal.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/fal.rsi
    equipDelay: 3
  - type: Gun
    fireRate: 3
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/fal.ogg
      params:
        volume: -2
    minAngle: 50
    maxAngle: 120
    angleIncrease: 5.5
    angleDecay: 27.5
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Base751Mag10
        insertSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagIn/rifle_magin.ogg
