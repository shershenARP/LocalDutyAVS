# Семейство АК-103 (7.62x39) — порт из STALKER-14. Патроны 739 уже портированы.
- type: entity
  abstract: true
  parent: STBaseWeaponRifle
  id: STBaseWeaponRifleAK103
  components:
  - type: STWeight
    self: 3.6
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/ak103.rsi
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/ak103.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/ak103.rsi
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/103_shoot.ogg
    minAngle: 50
    maxAngle: 100
    angleIncrease: 1.8
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - FullAuto
    angleDecay: 8
    fireRate: 7
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Base739Mag10
        insertSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagIn/rifle_magin.ogg
        ejectSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagOut/rifle_magout.ogg
        priority: 4
        whitelist:
          tags:
          - Magazine739
      gun_module_muzzle:
        name: Muzzle
        priority: 3
        whitelist:
          tags:
          - STWeaponModuleRifleSilencerRu
      gun_module_scope:
        name: Scope
        priority: 2
        whitelist:
          tags:
          - STWeaponModuleRifleScopeRu
      gun_chamber:
        name: Chamber
        startingItem: STCartridge739FMJ
        priority: 1
        whitelist:
          tags:
          - STCartridge739
  - type: STWeaponDamageFalloff
    falloffMultiplier: 0.85
  - type: STWeaponAccuracy
    accuracyMultiplier: 1.55

