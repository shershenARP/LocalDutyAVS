      minAngleModifier: 0.9
    scopeEffect:
      delay: 0.3
      zoom: 1.2
      offset: 5
  - type: Sprite
    state: scope_T1_nato
  - type: Icon
    state: scope_T1_nato

- type: entity
  parent: STBaseModuleScopeRifles
  id: STModuleScopeRiflesT2Ru
  name: прицел автомата (РУ)
  suffix: "Модуль, Stalker, T2, RU"
  components:
  - type: Tag
    tags:
    - STWeaponModuleRifleScopeRu
  - type: STWeaponModule
    effect:
      minAngleModifier: 0.9
    scopeEffect:
      delay: 0.3
      zoom: 1.2
      offset: 6
  - type: Sprite
    state: scope_T2_ru
  - type: Icon
    state: scope_T2_ru

- type: entity
  parent: STBaseModuleScopeRifles
  id: STModuleScopeRiflesT2Nato
  name: прицел автомата (НАТО)
  suffix: "Модуль, Stalker, T2, NATO"
  components:
  - type: Tag
    tags:
    - STWeaponModuleRifleScopeNato
  - type: STWeaponModule
    effect:
      minAngleModifier: 0.8
    scopeEffect:
      delay: 0.3
      zoom: 1.2
      offset: 6
  - type: Sprite
    state: scope_T2_nato
  - type: Icon
    state: scope_T2_nato

# ── Снайперские прицелы (статы; зум — Фаза 2; type:Scope выкинут) ─────────────
- type: entity
  abstract: true
  parent: STBaseWeaponModule
  id: STBaseModuleSniperSight
  name: снайперский прицел
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/Modules/sniper_sights.rsi
    scale: 0.6, 0.6
  - type: Icon
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/Modules/sniper_sights.rsi
    scale: 0.6, 0.6
  - type: STWeaponModule
    layer: scope
    statePostfix: scope
    scopeEffect:
      delay: 0.4
      requireWielding: true
      useInHand: false

- type: entity
  parent: STBaseModuleSniperSight
  id: STModuleSniperSightT1
  name: кустарный снайперский прицел
  suffix: "Модуль, Stalker, T1"
  components:
  - type: Tag
    tags:
    - STWeaponModuleSniperSight
  - type: STWeaponModule
    effect:
      minAngleModifier: 0.9
    scopeEffect:
      zoom: 1.65
      offset: 13
  - type: Sprite
    state: sniper_sight_T1
  - type: Icon
    state: sniper_sight_T1

- type: entity
  parent: STBaseModuleSniperSight
  id: STModuleSniperSightT2
  name: заводской снайперский прицел
  suffix: "Модуль, Stalker, T2"
  components:
  - type: Tag
    tags:
    - STWeaponModuleSniperSight
  - type: STWeaponModule
    effect:
      minAngleModifier: 0.7
    scopeEffect:
      zoom: 1.65
      offset: 14
  - type: Sprite
    state: sniper_sight_T2
  - type: Icon
    state: sniper_sight_T2
