# Обвесы (модули) — порт из STALKER-14, Фаза 1 DutyAVS.
# Работают: статы (отдача/скорострел/скорость пули), доп. режимы огня (авто-шептало/glock-switch), визуал.
# НЕ работают пока: зум-скоупинг (scopeEffect сохранён в YAML, но поведения нет — Фаза 2).
# Глушители НЕ портированы (пожертвованы).

# ── База модуля ──────────────────────────────────────────────────────────────
- type: entity
  parent: BaseItem
  id: STBaseWeaponModule
  name: модуль оружия
  description: Хитро сляпанная приспособа для создания вундервафли.
  abstract: true
  components:
  - type: STWeaponModule
  - type: Sprite
    state: icon

# ── Авто-шептало (доп. режим FullAuto) ───────────────────────────────────────
- type: entity
  parent: STBaseWeaponModule
  id: STModuleAutoSear
  name: авто-шептало
  description: Делает оружие полностью автоматическим, если ствол это поддерживает. Ставится в пистолеты и некоторые автоматы.
  suffix: "Модуль, Stalker"
  components:
  - type: Tag
    tags:
    - STModuleAutoSear
  - type: STWeaponModule
    effect:
      additionalAvailableModes:
      - FullAuto
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Modules/autosear.rsi
    scale: 0.6, 0.6

- type: entity
  parent: STBaseWeaponModule
  id: STModuleGlockSwitch
  name: Glock switch
  description: Насадка для пистолета Glock, позволяющая вести полностью автоматический огонь. Несовместима с другим оружием.
  suffix: "Модуль, Stalker"
  components:
  - type: Tag
    tags:
    - STModuleGlockSwitch
  - type: STWeaponModule
    effect:
      additionalAvailableModes:
      - FullAuto
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Modules/autosear.rsi
    scale: 0.6, 0.6

# ── Грипсы ПП (снижение minAngle) ────────────────────────────────────────────
- type: entity
  abstract: true
  parent: STBaseWeaponModule
  id: STBaseModuleUnderbarrelSMG
  name: рукоять
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/SMGs/Modules/smg_grips.rsi
    scale: 0.6, 0.6
  - type: Icon
    sprite: _Stalker/Objects/Weapons/Guns/SMGs/Modules/smg_grips.rsi
    scale: 0.6, 0.6

- type: entity
  parent: STBaseModuleUnderbarrelSMG
  id: STModuleSMGGripT1
  name: кустарная рукоять ПП
  suffix: "Модуль, Stalker, T1"
  components:
  - type: Tag
    tags:
    - STWeaponModuleSMGGrip
  - type: STWeaponModule
    effect:
      minAngleModifier: 0.9
  - type: Sprite
    state: smg_grip_T1
  - type: Icon
    state: smg_grip_T1

- type: entity
  parent: STBaseModuleUnderbarrelSMG
  id: STModuleSMGGripT2
  name: заводская рукоять ПП
  suffix: "Модуль, Stalker, T2"
  components:
  - type: Tag
    tags:
    - STWeaponModuleSMGGrip
  - type: STWeaponModule
    effect:
      minAngleModifier: 0.8
  - type: Sprite
    state: smg_grip_T2
  - type: Icon
    state: smg_grip_T2

# ── Прицелы рифлов (статы; зум — Фаза 2) ─────────────────────────────────────
- type: entity
  abstract: true
  parent: STBaseWeaponModule
  id: STBaseModuleScopeRifles
  name: прицел автомата
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/Modules/scope.rsi
    scale: 0.6, 0.6
  - type: Icon
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/Modules/scope.rsi
    scale: 0.6, 0.6
  - type: STWeaponModule
    scopeEffect:
      delay: 0.3
      requireWielding: true
      useInHand: false

- type: entity
  parent: STBaseModuleScopeRifles
  id: STModuleScopeRiflesT1Ru
  name: кустарный прицел (РУ)
  suffix: "Модуль, Stalker, T1, RU"
  components:
  - type: Tag
    tags:
    - STWeaponModuleRifleScopeRu
  - type: STWeaponModule
    effect:
      minAngleModifier: 0.9
    scopeEffect:
      delay: 0.3
      zoom: 1.2
      offset: 5
  - type: Sprite
    state: scope_T1_ru
  - type: Icon
    state: scope_T1_ru

- type: entity
  parent: STBaseModuleScopeRifles
