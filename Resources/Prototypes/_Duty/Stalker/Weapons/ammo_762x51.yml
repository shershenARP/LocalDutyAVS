# Боеприпасы 7.62x51 NATO — порт из STALKER-14. Mutant→Piercing.

# ── Снаряды ──────────────────────────────────────────────────────────────────
- type: entity
  id: Bullet751M80
  name: bullet (7.62x51)
  parent: STBaseHRBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 8
  - type: Projectile
    projectileClass: 3
    damage:
      types:
        Piercing: 35
  - type: StaminaDamageOnCollide
    damage: 7

- type: entity
  id: Bullet751Noiser
  name: bullet (7.62x51)
  parent: Bullet751M80
  categories: [ HideSpawnMenu ]
