# ── Патроны ──────────────────────────────────────────────────────────────────
- type: entity
  id: BaseCartridge751
  name: cartridge (7.62x51)
  parent: BaseCartridge
  abstract: true
  components:
  - type: Tag
    tags:
    - Cartridge
    - STCartridge751
  - type: CartridgeAmmo
    deleteOnSpawn: true
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Casings/ammo_casing.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
    state: "base"

- type: entity
  id: Cartridge751M80
  name: cartridge (7.62x51) M80
  suffix: "Stalker"
  parent: BaseCartridge751
