  parent: BaseItem
  components:
  - type: Tag
    tags:
    - Magazine751
  - type: BallisticAmmoProvider
    mayTransfer: true
    proto: Cartridge751M80
    whitelist:
      tags:
      - STCartridge751
    capacity: 10
  - type: Item
    size: Small
    shape:
    - 0,0,0,0
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    scale: 0.8, 0.8
    sprite: _Stalker/Objects/Weapons/Guns/Ammunition/Magazines/751/10.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
