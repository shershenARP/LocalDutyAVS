# AKM — порт из STALKER-14 на ванильную базу BaseWeaponRifle.
# Стрипнуто: STWeight, STWeaponDamageFalloff, STWeaponAccuracy, модули/обвесы
# (слоты добавим в Фазе 2 вместе с системой), Craftable/Repository/Engraveable и т.п.

- type: entity
  abstract: true
  parent: BaseWeaponRifle
  id: STBaseWeaponRifleAKM
  name: AKM
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/akm.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/akm.rsi
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/akm.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/103_shoot.ogg
    minAngle: 52
    maxAngle: 115
    angleIncrease: 1.5
    angleDecay: 8
    fireRate: 5.5
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - FullAuto
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/_Stalker/Weapons/Guns/RifleGen/Cock/rifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Base739Mag10
        insertSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagIn/rifle_magin.ogg
        ejectSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagOut/rifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - Magazine739
      gun_chamber:
        name: Chamber
        startingItem: STCartridge739FMJ
        priority: 1
        whitelist:
          tags:
          - STCartridge739
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot {}
      gun_chamber: !type:ContainerSlot {}

- type: entity
  parent: STBaseWeaponRifleAKM
  id: STWeaponRifleAKM
  name: AKM "Zone Legend"
  suffix: "Автомат, Stalker"
  description: Модернизация автомата Калашникова под патрон 7.62x39мм. Символ надёжности Зоны — от новичков до ветеранов.
