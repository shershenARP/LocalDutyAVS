- type: entity
  name: Флакон с неизвестной субстанцией
  parent: BaseItem
  id: FlaconShesrhenDuty
  description: Флакон с чем-то, похожим на жидкий металл, способный изменять свою форму и массу. Форма, которую принимает жидкость, зависит от Предписания. Оружие, которое оно производит, зависит от информации о цели и времени, отведённом на исполнение. Однажды, получив "кинжал", слишком маленький для задачи, он решил подождать, пока оно не произведёт другое оружие. Однако, несмотря на приближающийся срок, оно отказалось предоставить ему подходящее оружие; поэтому у него не было другого выбора, кроме как убить свою цель вилкой.
  suffix: Duty shershen
  components:
  - type: Sprite
    sprite: _Duty/Objects/Weapons/Melee/lozhkovilka/lozhkovilka.rsi
    state: flacon
  - type: Item
    size: Tiny
    sprite: _Duty/Objects/Weapons/Melee/lozhkovilka/lozhkovilka-inhand.rsi
  - type: MeleeWeapon
    attackRate: 2
    range: 0.5
    damage:
      types:
        Blunt: 1
  - type: SwitchableWeapon
    damageOpen:
      types:
        Blunt: 0
    damageFolded:
      types:
        Blunt: 1
    attackRateOpen: 1
    attackRateFolded: 2
    sizeOpened: Ginormous
    sizeClosed: Tiny

  - type: UseDelay
    delay: 1.0
  - type: DisarmMalus
    malus: 0
  - type: Appearance
  - type: ItemToggle
    predictable: false
    onUse: false
  - type: UnknownSubstanceFlacon
