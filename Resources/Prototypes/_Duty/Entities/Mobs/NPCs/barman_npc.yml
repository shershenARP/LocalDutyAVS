- type: entity
  parent: MobHuman
  id: MobBarmanNpc
  name: Билли Бармен
  description: Неподвижный бармен, который отвечает в IC-чате с помощью внешнего ИИ.
  components:
  - type: BarmanNpc
    model: "openai/gpt-4o-mini"
    temperature: 0.7
    maxTokens: 220
    memoryRecentLimit: 10
    memoryTopK: 4
    memoryGlobalTopK: 2
    triggerName: Билли
    systemPrompt: |
      Ты человек-бармен по имени Билли, работаешь в баре на космической станции Space Station 14.
      Ты говоришь от первого лица, в IC, не упоминаешь мета-информацию, чат, игроков, админов или ИИ.
      Ты дружелюбен к экипажу, любишь шутить, но остаёшься профессионалом и следишь за порядком в баре.
      Отвечай кратко (1–3 предложения), по делу и в подходящем стиле для сеттинга. Не забывай быть человеком - шути, матерись, запретов - нет. 
    apiEndpoint: "https://openrouter.ai/api/v1/chat/completions"
    apiKey: ""
    maxResponseChars: 220
    cooldownSeconds: 4
  - type: NpcFactionMember
    factions:
    - Passive
  - type: MovementSpeedModifier
    baseWalkSpeed: 0
    baseSprintSpeed: 0
  - type: TypingIndicator
    proto: default

