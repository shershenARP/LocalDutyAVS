# ══════════════════════════════════════════════════════════════
#  Плеер Duty —  предмет
# ══════════════════════════════════════════════════════════════

- type: entity
  id: DutyPocketPlayer
  name: плеер "Duty"
  parent: BaseItem
  description: Карманный плеер с подборкой музыки от Duty. Слушай и радуйся жизни.
  suffix: Duty
  components:
  - type: Sprite
    sprite: _Duty/PocketPlayer.rsi
    layers:
    - state: "off"
  - type: PocketPlayer
  - type: ActivatableUI
    key: enum.PocketPlayerUiKey.Key
  - type: UserInterface
    interfaces:
      enum.PocketPlayerUiKey.Key:
        type: PocketPlayerBoundUserInterface
  - type: Item
    size: Small


